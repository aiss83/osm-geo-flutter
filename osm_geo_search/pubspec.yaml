name: osm_geo_search
description: Full-text search plugin for OSM compact binary format (.bin).
  Optimized for mobile devices with mmap zero-copy access and binary search.
version: 0.1.0
homepage: https://github.com/osm-geo/osm-geo-flutter

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  ffigen: ^11.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
